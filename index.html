<style>
  /* ===== MODERN 3D MARIO CINEMATIC THEME ===== */

  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;800;900&display=swap');

  :root{
    --bg:#07111f;
    --bg2:#0f1d33;
    --card:#13233d;
    --red:#ff2d55;
    --red2:#ff5a5f;
    --yellow:#ffd54a;
    --blue:#46a7ff;
    --green:#39d98a;
    --text:#ffffff;
    --muted:#c8d6f5;
  }

  *{
    box-sizing:border-box;
  }

  body{
    margin:0;
    font-family:'Outfit',sans-serif;
    background:
      radial-gradient(circle at top,#234b88 0%,#07111f 55%),
      linear-gradient(to bottom,#07111f,#02050c);
    color:white;
    overflow-x:hidden;
  }

  body::before{
    content:'';
    position:fixed;
    inset:0;
    pointer-events:none;
    background:
      radial-gradient(circle at 20% 20%,rgba(255,255,255,.08),transparent 25%),
      radial-gradient(circle at 80% 10%,rgba(255,215,74,.08),transparent 25%),
      radial-gradient(circle at 70% 70%,rgba(70,167,255,.07),transparent 25%);
    animation:bgFloat 16s ease-in-out infinite alternate;
    z-index:-1;
  }

  @keyframes bgFloat{
    from{transform:translateY(0px);}
    to{transform:translateY(-20px);}
  }

  .header{
    position:sticky;
    top:0;
    z-index:1000;
    backdrop-filter:blur(18px);
    background:rgba(7,17,31,.65);
    border-bottom:1px solid rgba(255,255,255,.08);
  }

  .header-inner{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:1.1rem 0;
  }

  .logo{
    font-size:1.7rem;
    font-weight:900;
    letter-spacing:-1px;
    color:white;
    position:relative;
  }

  .logo span{
    background:linear-gradient(135deg,var(--yellow),#ff9f1a);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
  }

  .logo::after{
    content:'✨';
    position:absolute;
    right:-28px;
    top:-8px;
    animation:spinCoin 4s linear infinite;
  }

  @keyframes spinCoin{
    from{transform:rotateY(0deg);}
    to{transform:rotateY(360deg);}
  }

  .nav{
    display:flex;
    gap:2rem;
  }

  .nav a{
    color:white;
    text-decoration:none;
    font-weight:600;
    position:relative;
    transition:.3s;
  }

  .nav a::after{
    content:'';
    position:absolute;
    bottom:-6px;
    left:0;
    width:0%;
    height:3px;
    border-radius:20px;
    background:linear-gradient(to right,var(--yellow),var(--red));
    transition:.3s;
  }

  .nav a:hover::after{
    width:100%;
  }

  .nav a:hover{
    color:var(--yellow);
    transform:translateY(-2px);
  }

  .hero{
    position:relative;
    padding:7rem 0 5rem;
    overflow:hidden;
  }

  .hero::before{
    content:'';
    position:absolute;
    width:700px;
    height:700px;
    border-radius:50%;
    background:radial-gradient(circle,rgba(255,213,74,.18),transparent 70%);
    top:-250px;
    right:-150px;
    animation:pulse 6s infinite ease-in-out;
  }

  @keyframes pulse{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.08);}
  }

  .hero-inner{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:4rem;
    align-items:center;
  }

  .hero-text h1{
    font-size:4.5rem;
    line-height:.92;
    margin-bottom:1.5rem;
    font-weight:900;
    letter-spacing:-4px;
  }

  .hero-text h1 span{
    display:block;
    background:linear-gradient(135deg,var(--yellow),#ff9f1a);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
  }

  .hero-text p{
    color:var(--muted);
    font-size:1.2rem;
    line-height:1.7;
    max-width:600px;
  }

  .hero-actions{
    display:flex;
    gap:1rem;
    margin-top:2rem;
  }

  .btn{
    padding:1rem 1.5rem;
    border-radius:18px;
    text-decoration:none;
    font-weight:700;
    transition:.35s;
    display:inline-flex;
    align-items:center;
    justify-content:center;
  }

  .btn.primary{
    background:linear-gradient(135deg,var(--red),var(--red2));
    color:white;
    box-shadow:
      0 15px 35px rgba(255,45,85,.35),
      inset 0 1px 0 rgba(255,255,255,.4);
  }

  .btn.primary:hover{
    transform:translateY(-5px) scale(1.03);
    box-shadow:
      0 25px 45px rgba(255,45,85,.45),
      inset 0 1px 0 rgba(255,255,255,.4);
  }

  .btn.ghost{
    border:1px solid rgba(255,255,255,.15);
    background:rgba(255,255,255,.05);
    color:white;
    backdrop-filter:blur(10px);
  }

  .btn.ghost:hover{
    background:rgba(255,255,255,.12);
    transform:translateY(-4px);
  }

  .hero-badges{
    display:flex;
    gap:1rem;
    flex-wrap:wrap;
    margin-top:2rem;
  }

  .hero-badges span{
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.1);
    backdrop-filter:blur(14px);
    padding:.7rem 1rem;
    border-radius:999px;
    color:white;
    font-weight:600;
  }

  /* ===== 3D CARD ===== */

  .hero-car-card{
    position:relative;
    height:520px;
    border-radius:32px;
    overflow:hidden;
    background:
      linear-gradient(145deg,#1f3558,#0e1728);
    box-shadow:
      0 40px 80px rgba(0,0,0,.45),
      inset 0 1px 1px rgba(255,255,255,.12);
    transform-style:preserve-3d;
    transform:perspective(1400px) rotateY(-12deg) rotateX(4deg);
    transition:.5s;
  }

  .hero-car-card:hover{
    transform:perspective(1400px) rotateY(-4deg) rotateX(0deg) translateY(-10px);
  }

  .hero-car-card::before{
    content:'';
    position:absolute;
    inset:0;
    background:
      linear-gradient(130deg,transparent 30%,rgba(255,255,255,.18),transparent 60%);
    animation:shine 4s infinite linear;
  }

  @keyframes shine{
    from{transform:translateX(-100%);}
    to{transform:translateX(200%);}
  }

  .hero-car-card::after{
    content:'🍄';
    position:absolute;
    font-size:6rem;
    bottom:25px;
    right:25px;
    opacity:.12;
    transform:translateZ(80px);
  }

  .hero-car-content{
    position:absolute;
    inset:0;
    padding:3rem;
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
    z-index:2;
  }

  .hero-car-content h2{
    font-size:2.4rem;
    margin:0 0 .8rem;
    font-weight:900;
  }

  .hero-car-content p{
    color:var(--muted);
    margin-bottom:1.5rem;
  }

  .hero-car-content ul{
    list-style:none;
    padding:0;
    margin:0;
  }

  .hero-car-content li{
    margin-bottom:.9rem;
    display:flex;
    align-items:center;
    gap:.7rem;
    color:white;
  }

  .hero-car-content li::before{
    content:'⚡';
    color:var(--yellow);
  }

  /* ===== FLOATING COINS ===== */

  .coin{
    position:absolute;
    width:70px;
    height:70px;
    border-radius:50%;
    background:
      radial-gradient(circle at 30% 30%,#fff3a8,#ffd54a 40%,#ffb703);
    box-shadow:0 10px 25px rgba(255,213,74,.45);
    animation:floatCoin 6s ease-in-out infinite;
  }

  .coin::before{
    content:'$';
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#b86a00;
    font-size:2rem;
    font-weight:900;
  }

  .coin.one{
    top:80px;
    right:120px;
  }

  .coin.two{
    bottom:60px;
    left:-20px;
    animation-delay:2s;
  }

  @keyframes floatCoin{
    0%,100%{
      transform:translateY(0px) rotateY(0deg);
    }
    50%{
      transform:translateY(-20px) rotateY(180deg);
    }
  }

  /* ===== SECTIONS ===== */

  .section{
    padding:6rem 0;
    position:relative;
  }

  .section-title{
    text-align:center;
    font-size:3rem;
    margin-bottom:1rem;
    font-weight:900;
    letter-spacing:-2px;
  }

  .section-subtitle{
    text-align:center;
    color:var(--muted);
    max-width:700px;
    margin:0 auto 4rem;
    line-height:1.7;
  }

  .grid{
    display:grid;
    gap:2rem;
  }

  .services-grid,
  .pricing-grid,
  .testimonials-grid{
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  }

  /* ===== MODERN GLASS CARDS ===== */

  .card{
    position:relative;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.08);
    backdrop-filter:blur(18px);
    border-radius:28px;
    padding:2rem;
    overflow:hidden;
    transition:.4s;
  }

  .card::before{
    content:'';
    position:absolute;
    inset:0;
    background:linear-gradient(
      135deg,
      rgba(255,255,255,.12),
      transparent 35%
    );
    pointer-events:none;
  }

  .card:hover{
    transform:translateY(-12px);
    box-shadow:0 25px 50px rgba(0,0,0,.35);
    border-color:rgba(255,255,255,.18);
  }

  .service-card h3,
  .pricing-card h3{
    font-size:1.6rem;
    margin-bottom:1rem;
  }

  .service-card ul,
  .pricing-card ul{
    list-style:none;
    padding:0;
    margin-top:1.5rem;
  }

  .service-card li,
  .pricing-card li{
    margin-bottom:.9rem;
    color:var(--muted);
  }

  .service-card li::before,
  .pricing-card li::before{
    content:'✔';
    color:var(--green);
    margin-right:.7rem;
  }

  .price-tag,
  .pricing-price{
    margin-top:1.5rem;
    font-size:2rem;
    font-weight:900;
    background:linear-gradient(135deg,var(--yellow),#ff9f1a);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
  }

  .featured{
    border:2px solid rgba(255,213,74,.45);
    transform:scale(1.03);
  }

  .badge-accent{
    display:inline-block;
    padding:.5rem .9rem;
    border-radius:999px;
    background:linear-gradient(135deg,var(--yellow),#ff9f1a);
    color:#111;
    font-weight:800;
    margin-bottom:1rem;
  }

  /* ===== GALLERY ===== */

  .gallery-grid{
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  }

  .gallery-item{
    position:relative;
    min-height:280px;
    border-radius:30px;
    overflow:hidden;
    background:
      linear-gradient(135deg,#274b7a,#111d31);
    box-shadow:0 20px 50px rgba(0,0,0,.35);
    transition:.45s;
  }

  .gallery-item:hover{
    transform:scale(1.03) rotate(-1deg);
  }

  .gallery-item::before{
    content:'';
    position:absolute;
    inset:0;
    background:
      linear-gradient(to top,rgba(0,0,0,.7),transparent),
      url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?q=80&w=1200&auto=format&fit=crop') center/cover;
    opacity:.9;
  }

  .badge{
    position:absolute;
    left:20px;
    bottom:20px;
    z-index:2;
    padding:.7rem 1rem;
    border-radius:999px;
    background:rgba(255,255,255,.1);
    backdrop-filter:blur(10px);
    font-weight:700;
  }

  /* ===== CONTACT ===== */

  .contact-grid{
    display:grid;
    grid-template-columns:1.1fr .9fr;
    gap:2rem;
  }

  .contact-form input,
  .contact-form textarea,
  .contact-form select{
    width:100%;
    margin-top:.5rem;
    background:rgba(255,255,255,.07);
    border:1px solid rgba(255,255,255,.1);
    color:white;
    border-radius:16px;
    padding:1rem;
    font-family:'Outfit',sans-serif;
  }

  .form-group{
    margin-bottom:1.4rem;
  }

  .contact-info h3{
    font-size:2rem;
    margin-bottom:1rem;
  }

  .contact-highlight{
    margin-top:2rem;
    color:var(--yellow);
    font-weight:700;
  }

  footer{
    padding:2rem 0;
    border-top:1px solid rgba(255,255,255,.08);
    background:#030812;
  }

  .footer-inner{
    text-align:center;
    color:var(--muted);
  }

  /* ===== MOBILE ===== */

  @media(max-width:980px){

    .hero-inner,
    .contact-grid{
      grid-template-columns:1fr;
    }

    .hero-text{
      text-align:center;
    }

    .hero-actions,
    .hero-badges{
      justify-content:center;
    }

    .hero-text h1{
      font-size:3rem;
    }

    .nav{
      display:none;
    }

    .hero-car-card{
      height:420px;
      transform:none;
    }
  }

</style>
