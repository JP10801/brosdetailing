<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Mario Shine Bros — Red Edition</title>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;800;900&display=swap"
    rel="stylesheet"
  >

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <div class="stars" id="stars"></div>

  <header class="header">
    <div class="container header-inner">

      <div class="logo">
        <span class="word">
          <span class="b">B</span>
          <span class="r">R</span>
          <span class="o">O</span>
          <span class="s">S</span>
        </span>

        <span class="detail">DETAIL</span>
      </div>

    </div>
  </header>

  <main>

    <section id="hero" class="hero">

      <div class="container hero-inner">

        <div class="hero-text">

          <h1>
            NEXT LEVEL
            <span>KART DETAILING</span>
          </h1>

          <p>
            Cinematic Mario-inspired auto detailing with premium shine,
            rainbow coatings, and star-powered protection.
          </p>

        </div>

        <div class="hero-image">

          <div class="hero-car-card">

            <div class="hero-car-content">

              <h2>POWER-UP DETAILING</h2>

              <p>Luxury 3D ceramic shine package</p>

              <ul>
                <li>Fire Flower Paint Gloss</li>
                <li>Rainbow Road Ceramic Coating</li>
                <li>Super Star Interior Finish</li>
              </ul>

            </div>

          </div>

        </div>

      </div>

    </section>

  </main>

  <!-- JS -->
  <script src="js/main.js"></script>

</body>
</html>
