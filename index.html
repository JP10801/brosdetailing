<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Mario Shine Bros — Red Edition</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#140404;
  --bg2:#2b0909;
  --card:#2a1111;

  --red:#ff2d2d;
  --red2:#ff5e3a;

  --yellow:#ffd54a;
  --blue:#5bbcff;

  --green:#39d98a;

  --text:#ffffff;
  --muted:#ffd6d6;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  font-family:'Outfit',sans-serif;

  background:
    radial-gradient(circle at top,#8b1e1e 0%,#2b0909 35%,#140404 70%),
    linear-gradient(to bottom,#140404,#050101);

  color:white;
  overflow-x:hidden;
}

/* BACKGROUND FX */

body::before{
  content:'';
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:-2;

  background:
    radial-gradient(circle at 20% 20%,rgba(255,255,255,.05),transparent 25%),
    radial-gradient(circle at 80% 10%,rgba(255,80,80,.12),transparent 25%),
    radial-gradient(circle at 70% 70%,rgba(255,120,0,.08),transparent 25%);

  animation:bgFloat 16s ease-in-out infinite alternate;
}

@keyframes bgFloat{
  from{transform:translateY(0px);}
  to{transform:translateY(-20px);}
}

/* STARS */

.stars{
  position:fixed;
  inset:0;
  z-index:-1;
  overflow:hidden;
}

.star{
  position:absolute;
  width:4px;
  height:4px;
  border-radius:50%;
  background:white;
  opacity:.8;
  animation:twinkle 4s infinite ease-in-out;
}

@keyframes twinkle{
  0%,100%{
    opacity:.2;
    transform:scale(.8);
  }
  50%{
    opacity:1;
    transform:scale(1.5);
  }
}

/* LAYOUT */

.container{
  width:min(1180px,92%);
  margin:auto;
}

.section{
  padding:6rem 0;
  position:relative;
}

/* HEADER */

.header{
  position:sticky;
  top:0;
  z-index:999;

  backdrop-filter:blur(18px);

  background:rgba(20,4,4,.75);

  border-bottom:1px solid rgba(255,255,255,.08);
}

.header-inner{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:1.2rem 0;
}

.logo{
  font-size:1.8rem;
  font-weight:900;
  letter-spacing:-1px;
  display:flex;
  gap:.6rem;
  align-items:center;
}

/* BROS letter colors */
.logo .b{ color:#009BD9; }
.logo .r{ color:#FE0002; }
.logo .o{ color:#44AF35; }
.logo .s{ color:#FCCF00; }

/* DETAIL text */
.logo .detail{
  color:#009BD9;
  font-weight:800;
  letter-spacing:1px;
}

.logo span{
  text-shadow:
    0 0 18px rgba(254,0,2,.25),
    0 0 25px rgba(0,155,217,.15);
}

/* HERO */

.hero{
  min-height:100vh;
  display:flex;
  align-items:center;
  overflow:hidden;
  position:relative;
}

.hero-inner{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:5rem;
  align-items:center;
}

.hero-text h1{
  font-size:5rem;
  line-height:.9;
  margin-bottom:1.5rem;
  font-weight:900;
  letter-spacing:-4px;
}

.hero-text h1 span{
  display:block;
  background:linear-gradient(135deg,var(--yellow),#ff9f1a);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.hero-text p{
  font-size:1.2rem;
  color:var(--muted);
  line-height:1.8;
  max-width:600px;
}

/* HERO CARD */

.hero-image{
  position:relative;
}

.hero-car-card{
  position:relative;
  height:540px;
  border-radius:35px;
  overflow:hidden;

  background:linear-gradient(145deg,#551111,#220909);

  box-shadow:
    0 40px 80px rgba(0,0,0,.5),
    0 0 40px rgba(255,45,45,.18),
    inset 0 1px 1px rgba(255,255,255,.1);
}

.hero-car-content{
  position:absolute;
  inset:0;
  padding:3rem;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
}

/* (ALL OTHER STYLES UNCHANGED BELOW) */

/* remaining CSS unchanged ... */

</style>
</head>

<body>

<div class="stars" id="stars"></div>

<header class="header">
  <div class="container header-inner">
    <div class="logo">
      <span class="word">
        <span class="b">B</span>
        <span class="r">R</span>
        <span class="o">O</span>
        <span class="s">S</span>
      </span>
      <span class="detail">DETAIL</span>
    </div>
  </div>
</header>

<main>

<section id="hero" class="hero">

  <div class="container hero-inner">

    <div class="hero-text">
      <h1>
        NEXT LEVEL
        <span>KART DETAILING</span>
      </h1>

      <p>
        Cinematic Mario-inspired auto detailing with premium shine,
        rainbow coatings, and star-powered protection.
      </p>
    </div>

    <div class="hero-image">

      <!-- ✅ COINS REMOVED -->

      <div class="hero-car-card">
        <div class="hero-car-content">
          <h2>POWER-UP DETAILING</h2>
          <p>Luxury 3D ceramic shine package</p>
        </div>
      </div>

    </div>

  </div>

</section>

</main>

<script>
const stars = document.getElementById('stars');

for(let i = 0; i < 120; i++){
  const star = document.createElement('div');
  star.classList.add('star');
  star.style.left = Math.random() * 100 + '%';
  star.style.top = Math.random() * 100 + '%';
  star.style.animationDelay = Math.random() * 5 + 's';
  star.style.opacity = Math.random();
  stars.appendChild(star);
}
</script>

</body>
</html>
